name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Syntax check ──────────────────────────────────────────────────────
  # Catches IndentationError / SyntaxError before deploy.
  syntax:
    name: Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile all .py files
        run: python -m compileall -q expardus_tracing/ tests/
